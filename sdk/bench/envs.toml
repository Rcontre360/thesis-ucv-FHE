# Per-library Python environment for the benchmarks.
#
# Each benchmark runs every backend in its own subprocess; this file decides
# which Python interpreter (venv) each library uses. Paths are venv directories,
# relative to sdk/ or absolute; the driver runs "<venv>/bin/python". A library
# uses its [interpreters] entry, or "default" if it has none.
#
# Library ids come from the process names: run_sdk -> sdk, run_orion -> orion,
# run_cml -> cml, run_pytorch -> pytorch.
#
# Provision the per-library venvs with:  tox -e <name>   (see sdk/tox.ini)

default = ".env"

[interpreters]
# Orion needs torch>=2.4 (torch.compile/dynamo is unsupported on Python 3.12
# with torch 2.3.1, which Concrete-ML pins). It gets its own env.
orion = ".env-orion"
