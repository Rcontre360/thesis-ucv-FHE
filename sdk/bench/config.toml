# Bench-wide config. Provision per-library venvs with: tox -e <name>

[interpreters]
default = ".env"
orion = ".env-orion"  # needs torch>=2.4 for dynamo on py3.12; Concrete-ML pins 2.3.1

# The SDK and Orion dont use latency. Since cml (concrete) is the only one that needs separation of metrics
[samples]
default = {latency = 5, accuracy = 50}
pytorch = {latency = 100, accuracy = 200}
sdk     = {latency = 0,   accuracy = 50}   # single encrypted loop; see header
cml     = {latency = 2,   accuracy = 100}
orion   = {latency = 0,   accuracy = 50}   # single encrypted loop; see header

[samples.mlp]
cml = {latency = 1, accuracy = 20}

[samples.cnn]
cml = {latency = 1, accuracy = 20}
