[tox]
no_package = true

# Per-library benchmark venvs. tox provisions them in-place at .env-<lib> so the
# paths in bench/config.toml keep working; the SDK's own .env is not managed here.
# Provision with:  tox -e <lib>     (e.g. tox -e orion)

[testenv:orion]
description = Orion backend venv (unconstrained torch >= 2.4 for dynamo on py3.12)
basepython = python3.12
env_dir = {tox_root}/.env-orion
deps =
    -e {tox_root}/temp/orion
    nvidia-ml-py
    scikit-learn
    pandas
commands = python -c "import orion, torch; print('orion ok, torch', torch.__version__)"
