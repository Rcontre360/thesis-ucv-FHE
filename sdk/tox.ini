[tox]
no_package = true

# Bench venvs, provisioned in-place at the paths bench/config.toml expects.
# Provision with: tox -e <name>   (e.g. tox -e main, tox -e orion)

[testenv:main]
description = Main env: fhe-sdk + Concrete-ML (GPU) + bench-shared deps
basepython = python3.12
env_dir = {tox_root}/.env
skip_install = true
deps =
    cmake
commands_pre =
    pip install --index-url https://download.pytorch.org/whl/cu121 torch==2.3.1 torchvision==0.18.1
    pip install -e {tox_root}
    pip install concrete-ml nvidia-ml-py pandas scikit-learn
    -pip uninstall -y concrete-python
    pip install --no-deps --extra-index-url https://pypi.zama.ai/gpu --trusted-host pypi.zama.ai concrete-python==2024.12.19
commands = python -c "import api, torch, concrete.ml; print('main ok, torch', torch.__version__)"

[testenv:orion]
description = Orion backend venv (unconstrained torch >= 2.4 for dynamo on py3.12)
basepython = python3.12
env_dir = {tox_root}/.env-orion
deps =
    -e {tox_root}/temp/orion
    nvidia-ml-py
    scikit-learn
    pandas
commands = python -c "import orion, torch; print('orion ok, torch', torch.__version__)"
